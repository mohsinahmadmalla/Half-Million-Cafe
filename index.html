<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep:        #050d1a;
            --bg-mid:         #071228;
            --bg-soft:        #0c1a35;
            --bg-card:        #0a1630;
            --navy-light:     #112244;
            --silver:         #c8d8e8;
            --silver-bright:  #e8f0f8;
            --silver-dim:     #7a9ab8;
            --silver-muted:   #4a6a88;
            --accent:         #a8c8e8;
            --accent-bright:  #d0e8ff;
            --border:         rgba(168, 200, 232, 0.12);
            --border-strong:  rgba(168, 200, 232, 0.25);
            --glass:          rgba(7, 18, 40, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-deep);
            color: var(--silver);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ── BACKGROUND SYSTEM ── */

        /* Base deep-ocean gradient */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 140% 80% at 0% 0%,   #0b1f45 0%, transparent 55%),
                radial-gradient(ellipse 100% 70% at 100% 100%, #071535 0%, transparent 50%),
                radial-gradient(ellipse 80%  90% at 50% 50%,  #060f22 0%, transparent 70%),
                linear-gradient(175deg, #071228 0%, #050d1a 50%, #030810 100%);
            pointer-events: none;
        }

        /* Animated silver shimmer — top right */
        body::after {
            content: '';
            position: fixed;
            top: -300px;
            right: -300px;
            width: 900px;
            height: 900px;
            background: radial-gradient(circle, rgba(168,200,232,0.07) 0%, rgba(100,160,220,0.04) 35%, transparent 65%);
            border-radius: 50%;
            animation: shimmerDrift 20s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes shimmerDrift {
            0%   { transform: translate(0,   0)   scale(1);    opacity: 0.7; }
            50%  { transform: translate(-80px, 100px) scale(1.1); opacity: 1; }
            100% { transform: translate(-40px, 60px)  scale(0.95); opacity: 0.8; }
        }

        /* Second orb — bottom left */
        .orb-2 {
            position: fixed;
            bottom: -350px;
            left: -250px;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(100,150,220,0.06) 0%, transparent 60%);
            border-radius: 50%;
            animation: shimmerDrift2 26s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes shimmerDrift2 {
            0%   { transform: translate(0, 0) scale(1); }
            100% { transform: translate(90px, -100px) scale(1.15); }
        }

        /* Subtle horizontal light band */
        .light-band {
            position: fixed;
            top: 38%;
            left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(168,200,232,0.04) 20%,
                rgba(200,220,245,0.10) 50%,
                rgba(168,200,232,0.04) 80%,
                transparent 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Grain texture */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.028;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            animation: grainAnim 0.4s steps(1) infinite;
        }

        @keyframes grainAnim {
            0%  { background-position:   0px   0px; }
            25% { background-position: -45px -20px; }
            50% { background-position:  30px -55px; }
            75% { background-position: -20px  40px; }
            100%{ background-position:  50px  15px; }
        }

        /* Diagonal silver streaks */
        .streaks {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .streaks::before {
            content: '';
            position: absolute;
            top: -50%; left: 28%;
            width: 1px; height: 250%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(168,200,232,0.06) 30%,
                rgba(200,225,255,0.14) 50%,
                rgba(168,200,232,0.06) 70%,
                transparent 100%);
            transform: rotate(-12deg);
        }
        .streaks::after {
            content: '';
            position: absolute;
            top: -50%; right: 22%;
            width: 1px; height: 250%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(168,200,232,0.04) 40%,
                rgba(200,225,255,0.09) 55%,
                rgba(168,200,232,0.04) 70%,
                transparent 100%);
            transform: rotate(-12deg);
        }

        /* All content above bg layers */
        nav, section, footer, .grain { position: relative; z-index: 2; }

        /* ── NAVIGATION ── */
        nav {
            padding: 25px 10%;
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(5, 10, 24, 0.82);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(28px);
            box-shadow: 0 1px 50px rgba(0,0,0,0.5);
        }
        nav::after {
            content: '';
            position: absolute;
            bottom: 0; left: 8%; right: 8%;
            height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(168,200,232,0.3) 30%,
                rgba(210,230,255,0.55) 50%,
                rgba(168,200,232,0.3) 70%,
                transparent);
        }
        .logo-img  { height: 42px; width: auto; opacity: 0.9; filter: grayscale(1) brightness(1.4); }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem; letter-spacing: 6px; font-weight: 400;
            color: var(--silver-bright); text-transform: uppercase;
        }

        /* ── SECTIONS ── */
        .section { padding: 80px 10%; max-width: 1400px; margin: 0 auto; position: relative; }

        .section-title {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem; margin-bottom: 50px; font-weight: 400;
            letter-spacing: 2px; color: var(--silver-bright);
        }
        .section-title::after {
            content: '';
            display: block;
            width: 56px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 16px auto 0;
        }

        /* ── TABS ── */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        .tab-btn {
            background: transparent; border: none;
            color: var(--silver-muted); padding: 10px 20px; cursor: pointer; transition: 0.5s;
            font-weight: 300; text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem;
            border-bottom: 1px solid transparent;
        }
        .tab-btn.active {
            color: var(--silver-bright);
            border-bottom: 1px solid rgba(168,200,232,0.6);
        }

        /* ── MENU CARDS ── */
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card {
            background: linear-gradient(145deg, #0d1e3d 0%, #091428 100%);
            border-radius: 4px; overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168,200,232,0.45) 50%, transparent);
            opacity: 0; transition: opacity 0.6s; z-index: 1;
        }
        .card:hover::before { opacity: 1; }
        .card:hover {
            border-color: var(--border-strong);
            transform: translateY(-8px);
            box-shadow: 0 28px 64px rgba(2,6,18,0.7), 0 0 40px rgba(100,160,230,0.07);
        }
        .card-img { width: 100%; height: 280px; object-fit: cover; opacity: 0.75; transition: 0.6s; }
        .card:hover .card-img { opacity: 1; }
        .price {
            color: var(--accent-bright); font-size: 1.1rem; font-weight: 300;
            margin: 15px 0; font-family: 'Montserrat', sans-serif; letter-spacing: 1px;
        }

        /* ── FORMS ── */
        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 50px; }
        .form-box {
            background: linear-gradient(145deg, rgba(10,20,45,0.95) 0%, rgba(7,14,32,0.98) 100%);
            padding: 45px; border-radius: 2px;
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(168,200,232,0.07), 0 24px 64px rgba(2,5,15,0.5);
            position: relative; overflow: hidden;
        }
        .form-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 120px; height: 120px;
            background: radial-gradient(circle at top left, rgba(100,160,230,0.07) 0%, transparent 70%);
            pointer-events: none;
        }
        .form-box::after {
            content: '';
            position: absolute;
            bottom: 0; right: 0;
            width: 100px; height: 100px;
            background: radial-gradient(circle at bottom right, rgba(80,130,210,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        input, select, textarea {
            width: 100%; padding: 16px; margin-bottom: 25px;
            background: transparent; border: none;
            border-bottom: 1px solid rgba(168,200,232,0.15);
            color: var(--silver-bright); border-radius: 0;
            font-family: inherit; font-weight: 200; transition: 0.4s;
        }
        input:focus, select:focus, textarea:focus {
            border-bottom-color: var(--accent);
            outline: none;
            background: rgba(100,160,230,0.03);
        }
        input::placeholder, textarea::placeholder { color: var(--silver-muted); }
        select option { background: var(--bg-mid); color: var(--silver); }

        .btn-gold {
            background: linear-gradient(135deg, #1a3a6a 0%, #2a5a9a 40%, #3a7acc 60%, #2060a8 100%);
            color: var(--silver-bright); border: none;
            width: 100%; padding: 20px; font-weight: 500; cursor: pointer;
            text-transform: uppercase; border-radius: 0; letter-spacing: 4px; font-size: 0.7rem;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .btn-gold::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-20deg);
            transition: 0.6s;
        }
        .btn-gold:hover::before { left: 150%; }
        .btn-gold:hover {
            letter-spacing: 6px;
            box-shadow: 0 0 30px rgba(60,120,210,0.35);
            background: linear-gradient(135deg, #1e4070 0%, #3060aa 40%, #4488dd 60%, #2870bc 100%);
        }

        /* ── REVIEWS ── */
        .review-card {
            padding: 30px 0;
            border-bottom: 1px solid rgba(168,200,232,0.08);
            margin-bottom: 10px;
        }
        .stars { color: var(--accent); margin-bottom: 12px; font-size: 0.8rem; letter-spacing: 3px; opacity: 0.9; }
        .review-time { font-size: 0.65rem; color: var(--silver-muted); display: block; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }

        /* ── FOOTER ── */
        footer {
            padding: 100px 10% 50px;
            background: linear-gradient(to bottom, #040b1c 0%, #030810 100%);
            border-top: 1px solid var(--border);
            text-align: center; color: var(--silver-dim); font-weight: 200;
            position: relative; overflow: hidden;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 600px; height: 1px;
            background: linear-gradient(90deg,
                transparent,
                rgba(168,200,232,0.35) 30%,
                rgba(200,225,255,0.6) 50%,
                rgba(168,200,232,0.35) 70%,
                transparent);
        }
        footer::after {
            content: '';
            position: absolute;
            top: -80px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 200px;
            background: radial-gradient(ellipse, rgba(80,140,220,0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .footer-info {
            color: var(--silver-bright); margin-bottom: 20px; font-weight: 400;
            font-family: 'Playfair Display', serif; font-size: 1.2rem; letter-spacing: 4px;
        }

        section + section { border-top: 1px solid rgba(100,150,220,0.06); }
    </style>
</head>
<body>

<div class="grain"></div>
<div class="orb-2"></div>
<div class="light-band"></div>
<div class="streaks"></div>

<nav>
    <img src="https://i.ibb.co/m5tTRvZ5/Gemini-Generated-Image-g1ek8og1ek8og1ek.png" class="logo-img">
    <span class="logo-text">HALF MILLION</span>
</nav>

<section class="section">
    <h2 class="section-title">The Curated Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" id="btn-coffee" onclick="filterMenu('coffee')">Artisan Roasts</button>
        <button class="tab-btn" id="btn-food" onclick="filterMenu('fine food')">Culinary Arts</button>
    </div>
    <div id="menu-grid">Loading Collection...</div>
</section>

<section class="section">
    <div class="form-container">
        <div class="form-box">
            <h3 style="font-weight:300; margin-bottom:30px; letter-spacing:2px;">Concierge Delivery</h3>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="Full Name" required>
                <input type="text" id="custAddress" placeholder="Delivery Address" required>
                <select id="payMethod" required>
                    <option value="" disabled selected>Payment Preference</option>
                    <option value="UPI / Online">Digital Transfer</option>
                    <option value="Cash on Delivery">Cash on Arrival</option>
                </select>
                <p style="margin-bottom:20px; font-size: 0.75rem; color:var(--silver-dim); letter-spacing:1px;">Selections: <span id="cartCount" style="color:var(--accent-bright)">0</span></p>
                <button type="submit" class="btn-gold">Place Order</button>
            </form>
        </div>

        <div class="form-box">
            <h3 style="font-weight:300; margin-bottom:30px; letter-spacing:2px;">Reservations</h3>
            <form id="resForm">
                <input type="text" id="resName" placeholder="Guest Name" required>
                <input type="datetime-local" id="resTime" required>
                <input type="number" id="resGuests" placeholder="Guest Count" min="1" required>
                <button type="submit" class="btn-gold" style="background:transparent; color:var(--accent); border:1px solid var(--border-strong);">Request Table</button>
            </form>
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">Guest Impressions</h2>
    <div class="form-container">
        <div class="form-box">
            <form id="revForm">
                <input type="text" id="revName" placeholder="Name" required>
                <select id="revStars" required>
                    <option value="5">Excellent</option>
                    <option value="4">Great</option>
                    <option value="3">Good</option>
                </select>
                <textarea id="revText" placeholder="Your experience..." rows="3" required></textarea>
                <button type="submit" class="btn-gold">Submit Review</button>
            </form>
        </div>
        <div id="review-display"></div>
    </div>
</section>

<footer>
    <p class="footer-info">HALF MILLION | SIGNATURE LOUNGE</p>
    <p style="margin-bottom:8px;">📍 Signature Lounge, Mumbai, India</p>
    <p style="margin-bottom:8px;">📞 Concierge: +91 8082666242</p>
    <p>✉️ Inquiries: info@halfmillion.com</p>
    <p style="margin-top: 40px; font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px;">EST. 2026 • PRIVACY FIRST</p>
</footer>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    
    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [], cart = [];

    window.onload = async () => {
        const { data, error } = await _sb.from('menu_item').select('*');
        if(!error) { masterItems = data; renderMenu('coffee'); }
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        const searchCat = (cat === 'fine food') ? 'food' : 'coffee';
        const filtered = masterItems.filter(i => i.category.toLowerCase().trim() === searchCat);
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <div style="padding:25px">
                        <h3 style="font-family:'Playfair Display'; font-weight:400; font-style:italic;">${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="btn-gold" style="padding:12px; font-size:0.6rem; letter-spacing:2px;" onclick="addToCart('${item.name}')">Select</button>
                    </div>
                </div>`;
        });
        document.getElementById('btn-coffee').classList.toggle('active', cat === 'coffee');
        document.getElementById('btn-food').classList.toggle('active', cat === 'fine food');
    }

    function filterMenu(cat) { renderMenu(cat); }
    function addToCart(n) { cart.push(n); document.getElementById('cartCount').innerText = cart.length; }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        if(!cart.length) return alert("Select items first.");
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        const pay = document.getElementById('payMethod').value;
        const msg = `*NEW ORDER*%0A*Client:* ${name}%0A*Selections:* ${cart.join(', ')}%0A*Address:* ${addr}%0A*Payment:* ${pay}`;
        window.open(`https://wa.me/918082666242?text=${msg}`);
    };

    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reservation').insert([{ 
            name: document.getElementById('resName').value, 
            date_time: document.getElementById('resTime').value, 
            guests: document.getElementById('resGuests').value 
        }]);
        alert(error ? "Submission error." : "Reservation Request Received.");
    };

    async function fetchReviews() {
        const { data } = await _sb.from('reviews').select('*');
        const div = document.getElementById('review-display');
        if(data) {
            const sorted = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            div.innerHTML = '';
            sorted.slice(0, 15).forEach(r => {
                const d = r.created_at ? new Date(r.created_at) : new Date();
                const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                div.innerHTML += `
                    <div class="review-card">
                        <div class="stars">${"★".repeat(r.rating)}</div>
                        <strong style="letter-spacing:1px; font-weight:400;">${r.name}</strong>
                        <p style="margin-top:10px; opacity:0.8; font-weight:200; font-style:italic;">"${r.content}"</p>
                        <span class="review-time">${dateStr} • ${timeStr}</span>
                    </div>`;
            });
        }
    }

    document.getElementById('revForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reviews').insert([{ 
            name: document.getElementById('revName').value, 
            rating: parseInt(document.getElementById('revStars').value), 
            content: document.getElementById('revText').value,
            created_at: new Date().toISOString()
        }]);
        if(!error) { fetchReviews(); document.getElementById('revForm').reset(); }
    };
</script>
</body>
</html>
