<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* VIBRANT ATTENTION-GRABBING COLOUR PALETTE */
        :root { 
            --primary-bg: #020617; /* Deep Midnight Blue */
            --electric-blue: #3b82f6; 
            --cyan-glow: #06b6d4; 
            --magenta-accent: #d946ef; 
            --card-bg: #0f172a;
            --text-main: #f8fafc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--primary-bg); 
            color: var(--text-main); 
            font-family: 'Montserrat', sans-serif; 
            /* Multi-color gradient background to attract the eye */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(217, 70, 239, 0.1) 0px, transparent 50%);
            line-height: 1.6;
        }
        
        /* NAVIGATION - VIBRANT GLOW */
        nav { 
            padding: 20px 8%; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            background: rgba(2, 6, 23, 0.9); 
            border-bottom: 2px solid var(--electric-blue);
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.2);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(12px);
        }
        .logo-img { height: 50px; border-radius: 50%; border: 2px solid var(--cyan-glow); }
        .logo-text { 
            font-family: 'Montserrat', sans-serif; font-weight: 800;
            background: linear-gradient(to right, var(--cyan-glow), var(--magenta-accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 1.6rem; letter-spacing: 2px;
        }

        .section { padding: 60px 8%; max-width: 1200px; margin: 0 auto; }
        .section-title { 
            text-align: center; font-family: 'Playfair Display', serif; 
            font-size: 3rem; margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }
        
        /* CATEGORY TABS - NEON STYLE */
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); 
            color: white; padding: 12px 30px; cursor: pointer; transition: 0.4s; 
            font-weight: 600; border-radius: 50px; text-transform: uppercase;
        }
        .tab-btn.active { 
            background: var(--electric-blue); border-color: var(--cyan-glow);
            box-shadow: 0 0 20px var(--electric-blue);
        }

        /* MENU GRID - VIBRANT CARDS */
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            border: 1px solid var(--glass-border); transition: 0.4s ease;
        }
        .card:hover { 
            transform: scale(1.03); border-color: var(--cyan-glow);
            box-shadow: 0 10px 40px rgba(6, 182, 212, 0.3);
        }
        .card-img { width: 100%; height: 230px; object-fit: cover; }
        .price { color: var(--cyan-glow); font-size: 1.6rem; font-weight: 800; margin: 10px 0; }

        /* FORMS - COLOURFUL INTERACTIVE BOXES */
        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .form-box { 
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            padding: 35px; border-radius: 24px; border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        input, select, textarea { 
            width: 100%; padding: 15px; margin-bottom: 20px; 
            background: rgba(2, 6, 23, 0.5); border: 1px solid var(--glass-border); 
            color: #fff; border-radius: 12px;
        }
        input:focus { border-color: var(--magenta-accent); outline: none; }
        .btn-gold { 
            background: linear-gradient(45deg, var(--electric-blue), var(--cyan-glow)); 
            color: white; border: none; width: 100%; padding: 18px; font-weight: 700; 
            cursor: pointer; text-transform: uppercase; border-radius: 12px;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--cyan-glow); }
        
        /* REVIEWS - MULTICOLOR LIST */
        .review-card { 
            background: rgba(255, 255, 255, 0.03); padding: 20px; 
            border-left: 4px solid var(--magenta-accent); margin-top: 15px; border-radius: 12px;
        }
        .stars { color: #fbbf24; margin-bottom: 8px; }
        .review-time { font-size: 0.75rem; color: var(--cyan-glow); display: block; margin-top: 10px; font-weight: 600; }

        /* FOOTER - CLEAR INFO */
        footer { 
            padding: 60px 8%; background: #010409; border-top: 1px solid var(--glass-border); 
            text-align: center; color: #94a3b8; margin-top: 60px;
        }
        .footer-info { 
            color: var(--cyan-glow); margin-bottom: 15px; font-weight: 800; 
            font-size: 1.4rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/m5tTRvZ5/Gemini-Generated-Image-g1ek8og1ek8og1ek.png" class="logo-img">
    <span class="logo-text">HALF MILLION</span>
</nav>

<section class="section">
    <h2 class="section-title">The Electric Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" id="btn-coffee" onclick="filterMenu('coffee')">Coffee Bar</button>
        <button class="tab-btn" id="btn-food" onclick="filterMenu('fine food')">Gourmet Food</button>
    </div>
    <div id="menu-grid">Loading Vibrant Flavours...</div>
</section>

<section class="section">
    <div class="form-container">
        <div class="form-box">
            <h3 style="color:var(--cyan-glow); margin-bottom:20px;">Express Order</h3>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="Full Name" required>
                <input type="text" id="custAddress" placeholder="Delivery Address" required>
                <select id="payMethod" required>
                    <option value="" disabled selected>Payment Choice</option>
                    <option value="UPI / Online">UPI (Instant)</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
                <p style="margin-bottom:15px; font-weight: 600;">Items: <span id="cartCount" style="color:var(--magenta-accent)">0</span></p>
                <button type="submit" class="btn-gold">Order via WhatsApp</button>
            </form>
        </div>

        <div class="form-box">
            <h3 style="color:var(--magenta-accent); margin-bottom:20px;">Book a Table</h3>
            <form id="resForm">
                <input type="text" id="resName" placeholder="Reservation Name" required>
                <input type="datetime-local" id="resTime" required>
                <input type="number" id="resGuests" placeholder="Number of Guests" min="1" required>
                <button type="submit" class="btn-gold" style="background:var(--magenta-accent); box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4);">Reserve Now</button>
            </form>
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">Guest Stories</h2>
    <div class="form-container">
        <div class="form-box">
            <form id="revForm">
                <input type="text" id="revName" placeholder="Your Name" required>
                <select id="revStars" required>
                    <option value="5">⭐⭐⭐⭐⭐ (Incredible)</option>
                    <option value="4">⭐⭐⭐⭐ (Excellent)</option>
                    <option value="3">⭐⭐⭐ (Good)</option>
                </select>
                <textarea id="revText" placeholder="How was your visit?" rows="3" required></textarea>
                <button type="submit" class="btn-gold">Post Review</button>
            </form>
        </div>
        <div id="review-display"></div>
    </div>
</section>

<footer>
    <p class="footer-info">HALF MILLION | SIGNATURE LOUNGE</p>
    <p>📍 Signature Lounge, Mumbai, India</p>
    <p>📞 Support: +91 8082666242</p>
    <p>✉️ Email: hello@halfmillion.com</p>
    <p style="margin-top: 30px; font-size: 0.7rem; opacity: 0.4;">&copy; 2026 Developed for the Future.</p>
</footer>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    
    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [], cart = [];

    window.onload = async () => {
        const { data, error } = await _sb.from('menu_item').select('*');
        if(!error) { masterItems = data; renderMenu('coffee'); }
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        const searchCat = (cat === 'fine food') ? 'food' : 'coffee';
        const filtered = masterItems.filter(i => i.category.toLowerCase().trim() === searchCat);
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <div style="padding:20px">
                        <h3 style="font-size:1.2rem;">${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="btn-gold" style="padding:10px; font-size:0.7rem;" onclick="addToCart('${item.name}')">Add to Order</button>
                    </div>
                </div>`;
        });
        document.getElementById('btn-coffee').classList.toggle('active', cat === 'coffee');
        document.getElementById('btn-food').classList.toggle('active', cat === 'fine food');
    }

    function filterMenu(cat) { renderMenu(cat); }
    function addToCart(n) { cart.push(n); document.getElementById('cartCount').innerText = cart.length; }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        if(!cart.length) return alert("Your cart is empty!");
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        const pay = document.getElementById('payMethod').value;
        const msg = `*NEW ELECTRIC ORDER*%0A*Name:* ${name}%0A*Items:* ${cart.join(', ')}%0A*Address:* ${addr}%0A*Payment:* ${pay}`;
        window.open(`https://wa.me/918082666242?text=${msg}`);
    };

    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reservation').insert([{ 
            name: document.getElementById('resName').value, 
            date_time: document.getElementById('resTime').value, 
            guests: document.getElementById('resGuests').value 
        }]);
        alert(error ? "Retry reservation." : "Table Requested Successfully!");
    };

    async function fetchReviews() {
        const { data } = await _sb.from('reviews').select('*');
        const div = document.getElementById('review-display');
        if(data) {
            // LOGIC FIXED: NEWEST ON TOP
            const sorted = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            div.innerHTML = '';
            sorted.slice(0, 15).forEach(r => {
                const d = r.created_at ? new Date(r.created_at) : new Date();
                const timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
                
                div.innerHTML += `
                    <div class="review-card">
                        <div class="stars">${"⭐".repeat(r.rating)}</div>
                        <strong style="color:var(--cyan-glow)">${r.name}</strong>
                        <p style="margin-top:5px; opacity:0.9;">"${r.content}"</p>
                        <span class="review-time">${dateStr} at ${timeStr}</span>
                    </div>`;
            });
        }
    }

    document.getElementById('revForm').onsubmit = async (e) => {
        e.preventDefault();
        // LOGIC FIXED: 2026 TIMESTAMP
        const { error } = await _sb.from('reviews').insert([{ 
            name: document.getElementById('revName').value, 
            rating: parseInt(document.getElementById('revStars').value), 
            content: document.getElementById('revText').value,
            created_at: new Date().toISOString()
        }]);
        if(!error) { fetchReviews(); document.getElementById('revForm').reset(); }
    };
</script>
</body>
</html>
