<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Secure Lounge</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; }
        nav { padding: 20px 5%; background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo-text { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 2px; }
        .section { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 20px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 8px; overflow: hidden; text-align: center; padding-bottom: 15px; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .price { color: var(--gold); margin: 10px 0; font-weight: bold; }
        .form-box { background: #111; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; }
        .btn-gold { background: var(--gold); color: #000; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; }
        .review-card { background: #111; padding: 15px; margin-top: 10px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

<nav><div class="logo-text">HALF MILLION</div></nav>

<section class="section">
    <h2 class="section-title">Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="renderMenu('coffee')">Coffee</button>
        <button class="tab-btn" onclick="renderMenu('food')">Food</button>
    </div>
    <div id="menu-grid">Loading items...</div>
</section>

<section class="section">
    <div class="form-box">
        <h3 style="color:var(--gold)">Table Booking</h3>
        <form id="resForm">
            <input type="text" id="resName" placeholder="Your Name" required>
            <input type="number" id="resGuests" placeholder="Guests" required>
            <button type="submit" class="btn-gold">Book Now</button>
        </form>
    </div>

    <div class="form-box">
        <h3 style="color:var(--gold)">Reviews</h3>
        <form id="addReviewForm">
            <input type="text" id="revName" placeholder="Name" required>
            <textarea id="revContent" placeholder="Message" required></textarea>
            <button type="submit" class="btn-gold">Submit Review</button>
        </form>
        <div id="review-display-grid"></div>
    </div>
</section>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    
    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [];

    // Start everything
    window.onload = async () => {
        alert("System starting..."); // This MUST pop up now.
        
        // 1. Get Menu
        const { data: menu, error: mErr } = await _sb.from('menu_item').select('*');
        if (mErr) {
            alert("Menu Error: " + mErr.message);
        } else {
            masterItems = menu;
            renderMenu('coffee');
        }

        // 2. Get Reviews
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        
        const filtered = masterItems.filter(i => i.category.toLowerCase().includes(cat.toLowerCase()));
        
        if (filtered.length === 0) {
            grid.innerHTML = "<p>No " + cat + " found. Check categories in Supabase!</p>";
            return;
        }

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <h3>${item.name}</h3>
                    <p class="price">₹${item.price}</p>
                </div>`;
        });

        // Update Tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(cat));
        });
    }

    async function fetchReviews() {
        const { data, error } = await _sb.from('reviews').select('*').limit(5);
        const display = document.getElementById('review-display-grid');
        if (data) {
            display.innerHTML = '';
            data.forEach(r => {
                display.innerHTML += `<div class="review-card"><strong>${r.name}</strong><p>${r.content}</p></div>`;
            });
        }
    }

    // Booking Submission
    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reservation').insert([{
            name: document.getElementById('resName').value,
            guests: document.getElementById('resGuests').value
        }]);
        alert(error ? "Error: " + error.message : "Booking Successful!");
    };

    // Review Submission
    document.getElementById('addReviewForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reviews').insert([{
            name: document.getElementById('revName').value,
            content: document.getElementById('revContent').value,
            rating: 5
        }]);
        if (!error) { alert("Review saved!"); fetchReviews(); }
    };
</script>
</body>
</html>
