<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million Cafe | Premium Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --gray: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .header { text-align: center; padding: 40px 0; border-bottom: 1px solid #333; }
        .gold-text { color: var(--gold); }
        
        /* Menu Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: var(--gray); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        
        /* Buttons */
        .btn { background: var(--gold); color: black; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .category-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .cat-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        
        /* Forms */
        .section { margin-top: 50px; background: var(--gray); padding: 25px; border-radius: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="gold-text">HALF MILLION CAFE</h1>
        <p>Order Delivery or Book a Table</p>
    </div>

    <div class="category-btns">
        <button class="cat-btn" onclick="fetchMenu('coffee')">☕ Coffee</button>
        <button class="cat-btn" onclick="fetchMenu('food')">🥐 Food</button>
    </div>
    <div id="menu-container" class="grid">
        <p style="text-align:center; grid-column: 1/-1;">Loading menu...</p>
    </div>

    <div class="section" id="order">
        <h2 class="gold-text">🛍️ Fast Delivery</h2>
        <p>Items will be sent via WhatsApp to the Cafe</p>
        <input type="text" id="order-name" placeholder="Your Name">
        <textarea id="order-address" placeholder="Delivery Address"></textarea>
        <select id="payment-method">
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="Online Payment (Send Link)">Pay Online (Send me a link)</option>
        </select>
        <input type="text" id="order-items" placeholder="What would you like to eat?">
        <button class="btn" onclick="sendOrder()">PLACE ORDER NOW</button>
    </div>

    <div class="section" id="booking">
        <h2 class="gold-text">📅 Table Reservation</h2>
        <input type="text" id="book-name" placeholder="Name">
        <input type="datetime-local" id="book-time">
        <input type="number" id="book-guests" placeholder="How many guests?">
        <button class="btn" style="background: white;" onclick="saveBooking()">RESERVE TABLE</button>
    </div>
</div>

<script>
    // 1. SETTINGS (Replace these!)
    const SUPABASE_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    const CAFE_WHATSAPP = '919876543210'; // Change to the Client's WhatsApp number (with country code)

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. FETCH MENU
    async function fetchMenu(cat) {
        const container = document.getElementById('menu-container');
        const { data, error } = await sb.from('menu_item').select('*').eq('category', cat);
        
        if (error) { container.innerHTML = "Error loading items."; return; }
        
        container.innerHTML = data.map(item => `
            <div class="card">
                <div style="font-size: 2rem;">${item.emoji}</div>
                <h3>${item.name}</h3>
                <p class="price">₹${item.price}</p>
                <button class="cat-btn" style="font-size: 0.8rem;" onclick="addToOrder('${item.name}')">+ Add</button>
            </div>
        `).join('');
    }

    function addToOrder(name) {
        document.getElementById('order-items').value += name + ", ";
    }

    // 3. WHATSAPP ORDERING (The "Money" Part)
    function sendOrder() {
        const name = document.getElementById('order-name').value;
        const addr = document.getElementById('order-address').value;
        const pay = document.getElementById('payment-method').value;
        const items = document.getElementById('order-items').value;

        if(!name || !items) { alert("Please fill name and items"); return; }

        const message = `*NEW ORDER FROM WEBSITE*%0A-------------------%0A*Name:* ${name}%0A*Items:* ${items}%0A*Address:* ${addr}%0A*Payment:* ${pay}`;
        window.open(`https://wa.me/${CAFE_WHATSAPP}?text=${message}`, '_blank');
    }

    // 4. RESERVATIONS
    async function saveBooking() {
        const name = document.getElementById('book-name').value;
        const time = document.getElementById('book-time').value;
        const guests = document.getElementById('book-guests').value;

        const { error } = await sb.from('reservation').insert([{ name, date_time: time, guests }]);

        if (error) { alert("Error: " + error.message); }
        else { alert("Table Reserved! We will see you then."); }
    }

    // Initial Load
    fetchMenu('coffee');
</script>

</body>
</html>
