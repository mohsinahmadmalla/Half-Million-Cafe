<!DOCTYPE html>
<html>
<head>
  <title>Restaurant Menu</title>
</head>
<body>

<h1>🍽️ My Restaurant</h1>

<h2>Menu</h2>
<div id="menu"></div>

<hr>

<h2>Admin Panel</h2>

<input id="name" placeholder="Item name" />
<input id="price" placeholder="Price" type="number" />
<button onclick="addItem()">Add Item</button>

<script>
const SUPABASE_URL = "https://bdugxkgfqpshhbfjkvju.supabase.co"
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE"

async function loadMenu() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/menus`, {
    headers: {
      "apikey": API_KEY
    }
  })

  const data = await res.json()
  const menuDiv = document.getElementById("menu")
  menuDiv.innerHTML = ""

  data.forEach(item => {
    const el = document.createElement("div")
    el.innerHTML = `
      ${item.name} - ₹${item.price}
      <button onclick="deleteItem('${item.id}')">❌</button>
    `
    menuDiv.appendChild(el)
  })
}

async function addItem() {
  const name = document.getElementById("name").value
  const price = document.getElementById("price").value

  await fetch(`${SUPABASE_URL}/rest/v1/menus`, {
    method: "POST",
    headers: {
      "apikey": API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, price })
  })

  loadMenu()
}

async function deleteItem(id) {
  await fetch(`${SUPABASE_URL}/rest/v1/menus?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      "apikey": API_KEY
    }
  })

  loadMenu()
}

loadMenu()
</script>

</body>
</html>
