<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 50px; width: auto; }
        .logo-text { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 2px; }

        .hero {
            height: 30vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); }

        .section { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin-bottom: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 10px 25px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--gold); color: black; }

        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-size: 1.2rem; font-weight: 600; margin: 10px 0; }

        .form-box { background: rgba(255,255,255,0.03); padding: 25px; border: 1px solid rgba(197, 160, 89, 0.2); margin-bottom: 30px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; }
        .btn-gold { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        #review-display-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .review-card { background: #111; padding: 20px; border-left: 3px solid var(--gold); }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <img src="https://i.ibb.co/m5tTRvZ5/Gemini-Generated-Image-g1ek8og1ek8og1ek.png" class="logo-img" alt="Logo">
        <span class="logo-text">HALF MILLION</span>
    </div>
</nav>

<section class="hero"><h1>Signature Experience</h1></section>

<section class="section">
    <h2 class="section-title">Our Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" id="btn-coffee" onclick="renderMenu('coffee')">Coffee</button>
        <button class="tab-btn" id="btn-food" onclick="renderMenu('food')">Fine Food</button>
    </div>
    <div id="menu-grid">Loading Luxury Items...</div>
</section>

<section class="section">
    <div class="form-box">
        <h3 style="color:var(--gold); margin-bottom:15px;">Secure Order (WhatsApp)</h3>
        <p style="font-size:0.9rem; margin-bottom:10px;">Cart: <span id="cartCount" style="color:var(--gold)">0</span> items</p>
        <button onclick="sendOrder()" class="btn-gold">Confirm Order via WhatsApp</button>
    </div>

    <div class="form-box">
        <h3 style="color:var(--gold); margin-bottom:15px;">Guest Feedback</h3>
        <form id="addReviewForm">
            <input type="text" id="revName" placeholder="Your Name" required>
            <textarea id="revContent" placeholder="Share your experience..." rows="3" required></textarea>
            <button type="submit" class="btn-gold">Submit Review</button>
        </form>
        <div id="review-display-grid"></div>
    </div>
</section>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    const PHONE = '918082666242';

    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [];
    let cart = [];

    window.onload = async () => {
        // Fetch Menu
        const { data: menu, error: mErr } = await _sb.from('menu_item').select('*');
        if (mErr) {
            alert("Database Error: " + mErr.message);
        } else {
            masterItems = menu;
            renderMenu('coffee');
        }
        // Fetch Reviews
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        
        // Tab switching logic
        document.getElementById('btn-coffee').classList.toggle('active', cat === 'coffee');
        document.getElementById('btn-food').classList.toggle('active', cat === 'food');

        const filtered = masterItems.filter(i => i.category.toLowerCase().trim() === cat.toLowerCase());
        
        if (filtered.length === 0) {
            grid.innerHTML = `<p style="text-align:center; width:100%">No items found in "${cat}". Check Supabase categories!</p>`;
            return;
        }

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <div class="card-info">
                        <h3>${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="btn-gold" style="padding:8px" onclick="addToCart('${item.name}')">Add to Order</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(name) {
        cart.push(name);
        document.getElementById('cartCount').innerText = cart.length;
        alert(name + " added to cart!");
    }

    function sendOrder() {
        if(cart.length === 0) return alert("Your cart is empty!");
        const text = `*NEW ORDER*%0A%0A*Items:* ${cart.join(', ')}`;
        window.open(`https://wa.me/${PHONE}?text=${text}`);
    }

    async function fetchReviews() {
        const { data, error } = await _sb.from('reviews').select('*').order('created_at', { ascending: false }).limit(3);
        const display = document.getElementById('review-display-grid');
        if (data) {
            display.innerHTML = '';
            data.forEach(r => {
                display.innerHTML += `<div class="review-card"><strong>${r.name}</strong><p>"${r.content}"</p></div>`;
            });
        }
    }

    document.getElementById('addReviewForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reviews').insert([{
            name: document.getElementById('revName').value,
            content: document.getElementById('revContent').value,
            rating: 5
        }]);
        if (!error) { 
            alert("Thank you!"); 
            document.getElementById('addReviewForm').reset();
            fetchReviews(); 
        }
    };
</script>
</body>
</html>
