<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million - Luxury Menu</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #121212;
            --card-bg: #1a1a1a;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header & Logo */
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            border: 1px solid var(--gold);
        }

        /* NEW HERO IMAGE SECTION */
        .hero-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .hero-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        h1 {
            color: var(--gold);
            font-size: 2.5rem;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--gold);
            color: var(--dark);
        }

        /* Menu Grid */
        #menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 100px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s;
        }

        .menu-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .menu-info {
            padding: 15px;
            text-align: center;
        }

        .price {
            color: var(--gold);
            font-size: 1.4rem;
            margin: 10px 0;
        }

        .add-btn {
            background: var(--gold);
            border: none;
            color: var(--dark);
            padding: 10px 20px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Order Bar */
        .order-bar {
            position: fixed;
            bottom: 20px;
            background: var(--gold);
            color: var(--dark);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/vzD3yv0/logo.png" class="logo" alt="Half Million Logo">
        <h2 style="color: var(--gold); letter-spacing: 2px;">HALF MILLION</h2>
    </header>

    <div class="hero-container">
        <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=800&q=80" 
             class="hero-image" 
             alt="Luxury Cafe Interior">
    </div>

    <h1>Luxury Menu</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="filterMenu('coffee')">Coffee</button>
        <button class="tab-btn" onclick="filterMenu('food')">Fine Food</button>
    </div>

    <div id="menu-container">
        </div>

    <div class="order-bar" onclick="sendWhatsApp()">
        <span id="item-count">0 Items</span>
        <span>|</span>
        <span id="total-price">₹0</span>
        <span>ORDER VIA WHATSAPP</span>
    </div>

    <script>
        // SUPABASE CONFIG (REPLACE WITH YOUR ACTUAL KEYS)
        const S_URL = 'YOUR_SUPABASE_URL';
        const S_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = navigator.supabase ? navigator.supabase : window.supabase.createClient(S_URL, S_KEY);

        let cart = [];
        let currentCategory = 'coffee';

        async function fetchMenu() {
            const { data, error } = await supabase
                .from('menu_items')
                .select('*')
                .eq('category', currentCategory);

            if (error) console.error(error);
            else renderMenu(data);
        }

        function renderMenu(items) {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map(item => `
                <div class="menu-card">
                    <img src="${item.image_url}" alt="${item.name}">
                    <div class="menu-info">
                        <h3>${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">Add to Order</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateOrderBar();
        }

        function updateOrderBar() {
            const count = cart.length;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('item-count').innerText = `${count} Items`;
            document.getElementById('total-price').innerText = `₹${total}`;
        }

        function filterMenu(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(cat));
            });
            fetchMenu();
        }

        function sendWhatsApp() {
            if (cart.length === 0) return alert("Please add items to your order first!");
            
            let message = "New Order from Half Million Menu:%0A%0A";
            cart.forEach(item => {
                message += `- ${item.name} (₹${item.price})%0A`;
            });
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            message += `%0A*Total: ₹${total}*`;
            
            window.open(`https://wa.me/YOUR_PHONE_NUMBER?text=${message}`);
        }

        // Initial Load
        fetchMenu();
    </script>
</body>
</html>
