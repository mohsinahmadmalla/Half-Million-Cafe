<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --card: #151515;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Montserrat', sans-serif;
            background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
        }

        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px);
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 50px; width: auto; }
        .logo-text { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; letter-spacing: 2px; }

        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600');
            background-size: cover; background-position: center;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); }

        .section { padding: 60px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 30px; }
        
        .tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 10px 30px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .tab-btn.active { background: var(--gold); color: black; }

        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-size: 1.2rem; font-weight: 600; margin: 10px 0; }

        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .form-box { background: var(--glass); padding: 30px; border: 1px solid rgba(197, 160, 89, 0.2); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: inherit; }
        .btn-gold { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gold:hover { opacity: 0.8; }

        #review-display-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .review-card { background: #111; padding: 20px; border-left: 3px solid var(--gold); }
        .stars { color: var(--gold); margin-bottom: 10px; }

        footer { background: #050505; padding: 40px 5%; text-align: center; border-top: 1px solid #1a1a1a; }
    </style>
</head>
<body>

<nav>
    <div class="logo-box">
        <img src="https://i.ibb.co/m5tTRvZ5/Gemini-Generated-Image-g1ek8og1ek8og1ek.png" class="logo-img" alt="Logo">
        <span class="logo-text">HALF MILLION</span>
    </div>
</nav>

<section class="hero">
    <h1>Signature Experience</h1>
</section>

<section class="section">
    <h2 class="section-title">Our Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="filterMenu('coffee', event)">Coffee</button>
        <button class="tab-btn" onclick="filterMenu('food', event)">Fine Food</button>
    </div>
    <div id="menu-grid">Loading...</div>
</section>

<section class="section" style="background: #080808;">
    <h2 class="section-title">Order & Reservations</h2>
    <div class="form-container">
        <div class="form-box">
            <h3 style="color:var(--gold); margin-bottom:15px;">Secure Delivery</h3>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="Full Name" required>
                <input type="text" id="custAddress" placeholder="Delivery Address" required>
                <select id="payMethod" required>
                    <option value="" disabled selected>Select Payment Method</option>
                    <option value="UPI / GPay">UPI (GPay/PhonePe)</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                    <option value="Card on Delivery">Card on Delivery</option>
                </select>
                <p style="font-size:0.8rem; margin-bottom:10px;">Cart: <span id="cartCount" style="color:var(--gold)">0</span> items</p>
                <button type="submit" class="btn-gold">Confirm & Pay via WhatsApp</button>
            </form>
        </div>

        <div class="form-box">
            <h3 style="color:var(--gold); margin-bottom:15px;">Table Booking</h3>
            <form id="resForm">
                <input type="text" id="resName" placeholder="Reservation Name" required>
                <input type="datetime-local" id="resTime" required>
                <input type="number" id="resGuests" placeholder="Number of Guests" required>
                <button type="submit" class="btn-gold">Request Table</button>
            </form>
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">Guest Feedback</h2>
    <div class="form-container">
        <div class="form-box">
            <h3 style="color:var(--gold); margin-bottom:15px;">Write a Review</h3>
            <form id="addReviewForm">
                <input type="text" id="revName" placeholder="Your Name" required>
                <select id="revRating" required>
                    <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                    <option value="4">⭐⭐⭐⭐ (Great)</option>
                    <option value="3">⭐⭐⭐ (Good)</option>
                </select>
                <textarea id="revContent" placeholder="Share your experience..." rows="3" required></textarea>
                <button type="submit" class="btn-gold">Submit Review</button>
            </form>
        </div>
        <div id="review-display-grid">
            </div>
    </div>
</section>

<footer>
    <p>📞 +91 80826 66242 | 📍 Luxury District, Block 5</p>
    <p style="opacity:0.3; margin-top:20px;">© 2026 HALF MILLION CAFE</p>
</footer>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    const PHONE = '918082666242';

    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [];
    let cart = [];

    // --- FETCH DATA ---
    async function init() {
        const { data: menu } = await _sb.from('menu_item').select('*');
        if (menu) { masterItems = menu; renderMenu('coffee'); }
        fetchReviews();
    }

    // --- MENU LOGIC ---
    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        masterItems.filter(i => i.category === cat).forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <div class="card-info">
                        <h3>${item.name}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="btn-gold" style="padding:8px" onclick="addToCart('${item.name}')">Add to Order</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(name) {
        cart.push(name);
        document.getElementById('cartCount').innerText = cart.length;
        alert("Added " + name);
    }

    // --- ORDER & PAYMENT ---
    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        if(cart.length === 0) return alert("Your cart is empty!");
        const method = document.getElementById('payMethod').value;
        const name = document.getElementById('custName').value;
        const addr = document.getElementById('custAddress').value;
        
        const text = `*NEW ORDER FROM WEBSITE*%0A%0A*Name:* ${name}%0A*Items:* ${cart.join(', ')}%0A*Address:* ${addr}%0A*Payment:* ${method}`;
        window.open(`https://wa.me/${PHONE}?text=${text}`);
    };

    // --- REVIEW LOGIC ---
    async function fetchReviews() {
        const { data: reviews } = await _sb.from('reviews').select('*').order('created_at', { ascending: false }).limit(3);
        const display = document.getElementById('review-display-grid');
        display.innerHTML = '';
        if(reviews) {
            reviews.forEach(r => {
                display.innerHTML += `
                    <div class="review-card">
                        <div class="stars">${"⭐".repeat(r.rating)}</div>
                        <p>"${r.content}"</p>
                        <br><strong>- ${r.name}</strong>
                    </div>`;
            });
        }
    }

    document.getElementById('addReviewForm').onsubmit = async (e) => {
        e.preventDefault();
        const reviewData = {
            name: document.getElementById('revName').value,
            rating: parseInt(document.getElementById('revRating').value),
            content: document.getElementById('revContent').value
        };
        const { error } = await _sb.from('reviews').insert([reviewData]);
        if (!error) {
            alert("Thank you for your feedback!");
            document.getElementById('addReviewForm').reset();
            fetchReviews();
        }
    };

    function filterMenu(cat, e) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderMenu(cat);
    }

    init();
</script>
</body>
</html>
