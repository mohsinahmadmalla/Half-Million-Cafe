<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; }
        nav { padding: 20px 5%; border-bottom: 1px solid rgba(197, 160, 89, 0.2); display: flex; justify-content: center; }
        .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.5rem; letter-spacing: 2px; }
        .section { padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: black; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; text-align: center; border-radius: 5px; overflow: hidden; padding-bottom: 15px; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .form-box { background: #111; padding: 25px; border: 1px solid #222; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; }
        .btn-gold { background: var(--gold); color: black; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; }
        .review-card { background: #161616; padding: 15px; border-left: 3px solid var(--gold); margin-top: 10px; }
        .stars { color: var(--gold); margin-bottom: 5px; }
    </style>
</head>
<body>

<nav><div class="logo">HALF MILLION</div></nav>

<section class="section">
    <div class="tabs">
        <button class="tab-btn active" id="btn-coffee" onclick="renderMenu('coffee')">Coffee</button>
        <button class="tab-btn" id="btn-food" onclick="renderMenu('food')">Fine Food</button>
    </div>
    <div id="menu-grid">Loading...</div>
</section>

<section class="section">
    <div class="form-box">
        <h3 style="color:var(--gold); margin-bottom:15px;">Order & Booking</h3>
        <form id="orderForm">
            <input type="text" id="custName" placeholder="Name" required>
            <input type="text" id="custAddress" placeholder="Address" required>
            <select id="payMethod"><option>UPI</option><option>Cash on Delivery</option></select>
            <button type="submit" class="btn-gold">Order via WhatsApp (<span id="count">0</span>)</button>
        </form>
        <hr style="margin:20px 0; opacity:0.1">
        <form id="resForm">
            <input type="datetime-local" id="resTime" required>
            <input type="number" id="resGuests" placeholder="Guests" required>
            <button type="submit" class="btn-gold" style="background:#444; color:white">Request Table</button>
        </form>
    </div>

    <div class="form-box">
        <h3 style="color:var(--gold); margin-bottom:15px;">Reviews</h3>
        <form id="revForm">
            <input type="text" id="revName" placeholder="Name" required>
            <select id="revStars"><option value="5">⭐⭐⭐⭐⭐</option><option value="4">⭐⭐⭐⭐</option><option value="3">⭐⭐⭐</option></select>
            <textarea id="revText" placeholder="Share experience..." required></textarea>
            <button type="submit" class="btn-gold">Submit Review</button>
        </form>
        <div id="review-display"></div>
    </div>
</section>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [], cart = [];

    window.onload = async () => {
        const { data, error } = await _sb.from('menu_item').select('*');
        if(!error) { masterItems = data; renderMenu('coffee'); }
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        masterItems.filter(i => i.category.toLowerCase() === cat).forEach(item => {
            grid.innerHTML += `<div class="card"><img src="${item.image_url}"><h3>${item.name}</h3><p style="color:var(--gold)">₹${item.price}</p><button onclick="addToCart('${item.name}')" style="margin:10px; padding:5px 15px; background:var(--gold); border:none; cursor:pointer">Add</button></div>`;
        });
        document.getElementById('btn-coffee').className = cat === 'coffee' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('btn-food').className = cat === 'food' ? 'tab-btn active' : 'tab-btn';
    }

    function addToCart(n) { cart.push(n); document.getElementById('count').innerText = cart.length; }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        if(!cart.length) return alert("Cart empty");
        const msg = `*ORDER*%0AName: ${document.getElementById('custName').value}%0AItems: ${cart.join(', ')}%0APay: ${document.getElementById('payMethod').value}`;
        window.open(`https://wa.me/918082666242?text=${msg}`);
    };

    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const { error } = await _sb.from('reservation').insert([{ name: document.getElementById('custName').value || 'Guest', date_time: document.getElementById('resTime').value, guests: document.getElementById('resGuests').value }]);
        alert(error ? "Error" : "Reserved!");
    };

    async function fetchReviews() {
        const { data } = await _sb.from('reviews').select('*').order('created_at', {ascending: false}).limit(3);
        const div = document.getElementById('review-display');
        if(data) {
            div.innerHTML = '';
            data.forEach(r => {
                div.innerHTML += `<div class="review-card"><div class="stars">${"⭐".repeat(r.rating)}</div><strong>${r.name}</strong><p>${r.content}</p></div>`;
            });
        }
    }

    document.getElementById('revForm').onsubmit = async (e) => {
        e.preventDefault();
        await _sb.from('reviews').insert([{ name: document.getElementById('revName').value, rating: parseInt(document.getElementById('revStars').value), content: document.getElementById('revText').value }]);
        fetchReviews(); document.getElementById('revForm').reset();
    };
</script>
</body>
</html>
