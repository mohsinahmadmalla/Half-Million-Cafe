<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Half Million | Signature Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0a0a0a; --card: #151515; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; background-image: radial-gradient(circle at top right, #1a1a1a, #0a0a0a); }
        nav { padding: 15px 5%; display: flex; align-items: center; gap: 15px; background: rgba(10, 10, 10, 0.95); border-bottom: 1px solid rgba(197, 160, 89, 0.2); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-img { height: 45px; width: auto; border-radius: 5px; }
        .logo-text { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
        .section { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2rem; margin-bottom: 30px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .tab-btn.active { background: var(--gold); color: black; }
        #menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .price { color: var(--gold); font-size: 1.2rem; font-weight: 600; margin: 10px 0; }
        .form-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .form-box { background: var(--glass); padding: 25px; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 4px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; font-family: inherit; border-radius: 4px; }
        .btn-gold { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        .review-card { background: #111; padding: 20px; border-left: 3px solid var(--gold); margin-top: 15px; border-radius: 0 4px 4px 0; }
        .stars { color: var(--gold); margin-bottom: 8px; }
        .review-date { display: block; font-size: 0.75rem; color: #888; margin-top: 10px; font-weight: 400; }
    </style>
</head>
<body>

<nav>
    <img src="https://i.ibb.co/m5tTRvZ5/Gemini-Generated-Image-g1ek8og1ek8og1ek.png" class="logo-img">
    <span class="logo-text">HALF MILLION</span>
</nav>

<section class="section">
    <h2 class="section-title">Luxury Menu</h2>
    <div class="tabs">
        <button class="tab-btn active" id="btn-coffee" onclick="filterMenu('coffee')">Coffee</button>
        <button class="tab-btn" id="btn-food" onclick="filterMenu('fine food')">Fine Food</button>
    </div>
    <div id="menu-grid">Loading Selection...</div>
</section>

<section class="section">
    <div class="form-container">
        <div class="form-box">
            <h3 style="color:var(--gold); margin-bottom:15px;">Secure Delivery</h3>
            <form id="orderForm">
                <input type="text" id="custName" placeholder="Full Name" required>
                <input type="text" id="custAddress" placeholder="Delivery Address" required>
                <select id="payMethod" required>
                    <option value="" disabled selected>Payment Method</option>
                    <option value="UPI / Online">UPI (GPay/PhonePe)</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select>
                <p style="margin-bottom:10px; font-size: 0.9rem;">Cart: <span id="cartCount" style="color:var(--gold)">0</span> items</p>
                <button type="submit" class="btn-gold">Confirm via WhatsApp</button>
            </form>
        </div>

        <div class="form-box">
            <h3 style="color:var(--gold); margin-bottom:15px;">Table Booking</h3>
            <form id="resForm">
                <input type="text" id="resName" placeholder="Reservation Name" required>
                <input type="datetime-local" id="resTime" required>
                <input type="number" id="resGuests" placeholder="Number of Guests" min="1" required>
                <button type="submit" class="btn-gold" style="background:#333; color:white;">Request Table</button>
            </form>
        </div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">Guest Feedback</h2>
    <div class="form-container">
        <div class="form-box">
            <form id="revForm">
                <input type="text" id="revName" placeholder="Your Name" required>
                <select id="revStars" required>
                    <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                    <option value="4">⭐⭐⭐⭐ (Great)</option>
                    <option value="3">⭐⭐⭐ (Good)</option>
                </select>
                <textarea id="revText" placeholder="How was your experience?" rows="3" required></textarea>
                <button type="submit" class="btn-gold">Submit Review</button>
            </form>
        </div>
        <div id="review-display"></div>
    </div>
</section>

<script>
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    
    const _sb = supabase.createClient(S_URL, S_KEY);
    let masterItems = [], cart = [];

    function sanitize(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    window.onload = async () => {
        const { data, error } = await _sb.from('menu_item').select('*');
        if(!error) { masterItems = data; renderMenu('coffee'); }
        fetchReviews();
    };

    function renderMenu(cat) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = '';
        const searchCat = (cat === 'fine food') ? 'food' : 'coffee';
        const filtered = masterItems.filter(i => i.category.toLowerCase().trim() === searchCat);
        
        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${item.image_url}" class="card-img">
                    <div style="padding:15px">
                        <h3>${sanitize(item.name)}</h3>
                        <p class="price">₹${item.price}</p>
                        <button class="btn-gold" style="padding:8px" onclick="addToCart('${item.name}')">Add to Order</button>
                    </div>
                </div>`;
        });
        document.getElementById('btn-coffee').classList.toggle('active', cat === 'coffee');
        document.getElementById('btn-food').classList.toggle('active', cat === 'fine food');
    }

    function filterMenu(cat) { renderMenu(cat); }
    function addToCart(n) { cart.push(n); document.getElementById('cartCount').innerText = cart.length; }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        if(!cart.length) return alert("Please add items to cart!");
        const name = sanitize(document.getElementById('custName').value);
        const addr = sanitize(document.getElementById('custAddress').value);
        const pay = document.getElementById('payMethod').value;
        const msg = `*NEW ORDER*%0A*Name:* ${name}%0A*Items:* ${cart.join(', ')}%0A*Address:* ${addr}%0A*Payment:* ${pay}`;
        window.open(`https://wa.me/918082666242?text=${msg}`);
    };

    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = sanitize(document.getElementById('resName').value);
        const { error } = await _sb.from('reservation').insert([{ 
            name: name, 
            date_time: document.getElementById('resTime').value, 
            guests: document.getElementById('resGuests').value 
        }]);
        alert(error ? "Error submitting" : "Reservation Sent Successfully!");
        if(!error) e.target.reset();
    };

    async function fetchReviews() {
        // 'ascending: false' puts the NEWEST 2026 reviews at the top
        const { data, error } = await _sb
            .from('reviews')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(20);

        const div = document.getElementById('review-display');
        if (data) {
            div.innerHTML = '';
            data.forEach(r => {
                // This fix ensures the date is NOT 1970
                const rawDate = r.created_at ? new Date(r.created_at) : new Date();
                const reviewDate = rawDate.toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short', year: 'numeric'
                });

                div.innerHTML += `
                    <div class="review-card">
                        <div class="stars">${"⭐".repeat(r.rating)}</div>
                        <strong>${sanitize(r.name)}</strong>
                        <p>"${sanitize(r.content)}"</p>
                        <span class="review-date" style="display:block; font-size:0.75rem; color:#888; margin-top:10px;">
                            Review Date: ${reviewDate}
                        </span>
                    </div>`;
            });
        }
  
   }
  
    document.getElementById('revForm').onsubmit = async (e) => {
        e.preventDefault();
        const name = sanitize(document.getElementById('revName').value);
        const content = sanitize(document.getElementById('revText').value);
        const stars = parseInt(document.getElementById('revStars').value);

        const { error } = await _sb.from('reviews').insert([{ 
            name: name, 
            rating: stars, 
            content: content 
        }]);

        if(!error) { 
            // This forces the list to refresh immediately so the user sees their new review
            setTimeout(() => { fetchReviews(); }, 500); 
            document.getElementById('revForm').reset(); 
        } else {
            alert("Error saving review. Please try again.");
        }
    };

</script>
</body>
</html>
