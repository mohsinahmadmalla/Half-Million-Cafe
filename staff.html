<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Half Million</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; padding: 20px; }
        h1 { color: #c5a059; text-align: center; margin-bottom: 30px; }
        
        #order-list { display: grid; gap: 15px; }
        .order-card { 
            background: #151515; border: 1px solid #333; padding: 20px; 
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge { 
            padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; 
            text-transform: uppercase;
        }
        .pending { background: #444; color: #bbb; }
        .paid { background: #2e7d32; color: white; } /* Green for Paid */
        .cod { background: #c5a059; color: black; }
        
        .order-info h3 { margin-bottom: 5px; color: #fff; }
        .items { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>KITCHEN ORDERS</h1>
    <div id="order-list">Loading Live Orders...</div>

<script>
 // USE THE SAME KEYS FROM YOUR MAIN CODE
    const S_URL = 'https://bdugxkgfqpshhbfjkvju.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWd4a2dmcXBzaGhiZmprdmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTYxNTcsImV4cCI6MjA5Mjc5MjE1N30.wUkI2sjPr5F0m2rNFfu2qqU4pwZZ1mPBUgAiGNquMOE';
    const _sb = supabase.createClient(S_URL, S_KEY);

    async function fetchOrders() {
        const { data, error } = await _sb
            .from('orders')
            .select('*')
            .neq('status', 'Completed') // Don't show finished orders
            .order('created_at', { ascending: false });

        if(!error) {
            const list = document.getElementById('order-list');
            list.innerHTML = data.map(order => `
                <div class="order-card">
                    <div class="order-info">
                        <h3>${order.customer_name}</h3>
                        <p class="items"><strong>Items:</strong> ${order.items}</p>
                        <p style="font-size:0.8rem; margin-top:5px;">Type: ${order.payment_method}</p>
                    </div>
                    <div class="status-badge ${order.status.toLowerCase().replace(' ', '-')}">
                        ${order.status}
                    </div>
                </div>
            `).join('');
        }
    }

    // Refresh the kitchen screen every 10 seconds automatically
    setInterval(fetchOrders, 10000);
    window.onload = fetchOrders;
